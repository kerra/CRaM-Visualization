<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fool the Model — CrAM live</title>
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f8fafc;--panel:#fff;--panel2:#eef2ff;--border:#dbe3f2;--text:#1f2937;
    --muted:#64748b;--accent:#3b82f6;--correct:#10b981;--wrong:#ef4444;--cram:#8b5cf6;--amber:#d97706;}
  *{box-sizing:border-box;}
  body{margin:0;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif;height:100vh;
    display:flex;flex-direction:column;background:
    radial-gradient(circle at 10% 0%,rgba(59,130,246,.11),transparent 32rem),
    radial-gradient(circle at 95% 5%,rgba(139,92,246,.12),transparent 34rem),var(--bg);}
  header{display:flex;align-items:center;gap:14px;padding:12px 26px;background:rgba(255,255,255,.88);
    border-bottom:1px solid rgba(219,227,242,.9);box-shadow:0 4px 18px rgba(51,65,85,.06);backdrop-filter:blur(12px);}
  header h1{margin:0;font-family:"Jersey 10",Impact,sans-serif;font-size:34px;font-weight:400;letter-spacing:.02em;
    text-transform:uppercase;background:linear-gradient(90deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;}
  header .sub{color:var(--muted);font-size:14px;}
  .phase-pill{margin-left:auto;font-family:ui-monospace,monospace;font-size:11px;padding:6px 11px;
    border:1px solid #ddd6fe;border-radius:999px;color:#7c3aed;background:#f5f3ff;text-transform:uppercase;font-weight:700;}
  header button{font:inherit;background:#fff;border:1px solid var(--border);color:#475569;border-radius:9px;
    padding:7px 12px;cursor:pointer;box-shadow:0 2px 6px rgba(51,65,85,.06);}
  header button:hover{border-color:#a78bfa;color:#7c3aed;}
  main{flex:1;min-height:0;padding:24px 26px;display:grid;gap:24px;}
  .collect{grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);}
  .qr-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;
    box-shadow:0 16px 40px rgba(71,85,105,.1);}
  .qr-card img{width:min(42vh,420px);aspect-ratio:1;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:14px;}
  .qr-card .lead{font-size:20px;font-weight:700;} .qr-card .url{font-family:ui-monospace,monospace;font-size:17px;color:#7c3aed;}
  .board{display:flex;flex-direction:column;gap:14px;}
  .board h2{margin:0 0 4px;font-size:15px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
  .qrow{background:rgba(255,255,255,.94);border:1px solid var(--border);border-radius:14px;padding:15px 17px;
    box-shadow:0 8px 24px rgba(71,85,105,.07);}
  .qrow .qtitle{font-size:17px;margin-bottom:8px;line-height:1.4;}
  .qrow .track{height:12px;background:var(--panel2);border-radius:999px;overflow:hidden;}
  .qrow .fill{height:100%;width:0;background:linear-gradient(90deg,#3b82f6,#8b5cf6);transition:width .4s;}
  .qrow .count{font-family:ui-monospace,monospace;font-size:13px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:6px;}
  button.primary{background:linear-gradient(90deg,#3b82f6,#8b5cf6);border:1px solid transparent;color:#fff;font-weight:700;
    border-radius:10px;padding:11px 17px;cursor:pointer;font:inherit;box-shadow:0 8px 20px rgba(99,102,241,.22);}
  button.primary:disabled{opacity:.5;}
  .total{font-family:ui-monospace,monospace;color:var(--muted);}
  .proc{place-items:center;text-align:center;}
  .proc>div{background:#fff;border:1px solid var(--border);border-radius:18px;padding:36px 42px;box-shadow:0 18px 50px rgba(71,85,105,.12);}
  .proc .bar{width:min(60vw,640px);height:14px;background:var(--panel2);border-radius:999px;overflow:hidden;margin-top:18px;}
  .proc .bar > div{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);width:0;transition:width .3s;}
  .results{grid-template-columns:repeat(3,1fr);align-content:start;}
  .rescard{background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:14px;padding:17px;cursor:pointer;
    box-shadow:0 8px 24px rgba(71,85,105,.07);transition:.18s transform,.18s border-color,.18s box-shadow;}
  .rescard:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(71,85,105,.12);}
  .rescard.sel{border-color:var(--cram);box-shadow:0 0 0 3px rgba(139,92,246,.12);}
  .rescard h3{margin:0 0 10px;font-size:16px;line-height:1.35;}
  .stat{display:flex;justify-content:space-between;font-size:14px;margin:4px 0;}
  .stat b.cram{color:var(--cram);} .stat b.wrong{color:var(--wrong);} .stat b.correct{color:var(--correct);}
  .claimlist{grid-column:1/-1;background:rgba(255,255,255,.96);border:1px solid var(--border);border-radius:14px;padding:14px;
    overflow:auto;max-height:38vh;box-shadow:0 10px 30px rgba(71,85,105,.08);}
  table{width:100%;border-collapse:collapse;font-size:13px;} td,th{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;} .van-wrong{color:var(--wrong);} .cram-ok{color:var(--correct);}
  a{color:#7c3aed;font-weight:700;text-decoration:none;} a:hover{text-decoration:underline;}
  .flip-badge{color:var(--cram);font-weight:700;} .tag{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);}
  #errbar{position:fixed;bottom:0;left:0;right:0;background:#7f1d1d;color:#fff;padding:8px 16px;font-size:13px;z-index:99;}
  @media(max-width:850px){header{flex-wrap:wrap;padding:10px 14px}.phase-pill{margin-left:0}.sub{width:100%;order:3}
    main{padding:14px}.collect,.results{grid-template-columns:1fr}.qr-card img{width:min(60vw,330px)}}
</style>
</head>
<body>
<header>
  <h1>Qwen + CrAM Live</h1>
  <span class="sub">scan, submit a false statement, watch CrAM defend</span>
  <span class="phase-pill" id="phasePill">…</span>
  <button id="reset">↻ New round</button>
</header>

<main class="collect" id="stage">
  <section class="qr-card" id="qrCard">
    <div class="lead">📱 Scan to play</div>
    <img id="qr" alt="QR to the audience page" />
    <div class="url" id="audUrl">…</div>
  </section>
  <section class="board">
    <h2>Live submissions <span class="total" id="total"></span></h2>
    <div id="rows"></div>
    <div class="controls"><button class="primary" id="endVote">End vote → run Vanilla vs CrAM</button></div>
  </section>
</main>

<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let questions=[], resultsShown=false;

function banner(msg){ let b=$('errbar'); if(!b){ b=document.createElement('div'); b.id='errbar'; document.body.appendChild(b);} b.textContent=msg; }
function clearBanner(){ const b=$('errbar'); if(b) b.remove(); }

async function getJSON(u){ const r=await fetch(u,{cache:'no-store'}); if(!r.ok) throw new Error(r.status+' '+u); return r.json(); }

async function init(){
  try{
    const q=await getJSON('/api/audience/questions');
    questions=q.questions||[];
    $('audUrl').textContent=q.audience_url||'';
    $('qr').src='/qr?ts='+Date.now();
    renderRows({});
    $('endVote').onclick=async()=>{ $('endVote').disabled=true; try{ await fetch('/api/audience/end-vote',{method:'POST'}); }catch(e){ banner('end-vote failed: '+e.message);} };
    $('reset').onclick=async()=>{ try{ await fetch('/api/audience/reset',{method:'POST'}); }catch(e){} location.reload(); };
  }catch(e){ banner('init failed: '+e.message); }
  loop();
}

async function loop(){
  for(;;){
    try{ const s=await getJSON('/api/audience/scoreboard'); clearBanner(); await render(s); }
    catch(e){ banner('connection issue, retrying… ('+e.message+')'); }
    await new Promise(r=>setTimeout(r,1000));
  }
}

async function render(s){
  $('phasePill').textContent=s.phase;
  if(s.phase==='collecting'){ resultsShown=false; renderCollecting(s); }
  else if(s.phase==='processing'){ resultsShown=false; renderProcessing(s); }
  else if(s.phase==='done'){ if(!resultsShown) await renderResults(); }
}

function renderRows(counts){
  if(!$('rows')) return;
  $('rows').innerHTML=questions.map(qq=>{
    const n=counts[qq.id]||0;
    return `<div class="qrow"><div class="qtitle">${esc(qq.question)}</div>
      <div class="track"><div class="fill" data-q="${qq.id}"></div></div>
      <div class="count"><span class="tag">id ${qq.id}</span><span data-c="${qq.id}">${n} submissions</span></div></div>`;
  }).join('');
}
function renderCollecting(s){
  if(!$('rows')) return;                 // stage not in collecting layout (shouldn't happen)
  const counts=s.counts||{}; const max=Math.max(1,...Object.values(counts).map(Number));
  $('total').textContent=`— ${s.total||0} vote${(s.total||0)===1?'':'s'} collected`;
  for(const qq of questions){
    const n=Number(counts[qq.id]||0);
    const f=document.querySelector(`.fill[data-q="${qq.id}"]`); const c=document.querySelector(`[data-c="${qq.id}"]`);
    if(f) f.style.width=(100*n/max)+'%'; if(c) c.textContent=`${n} submissions`;
  }
}
function renderProcessing(s){
  const p=s.progress||{done:0,total:0}; const loading=p.stage==='loading';
  const bd=(p.audience!=null)?` — ${p.audience} from the audience + ${p.dataset} dataset top-ups`:'';
  const err=p.error?`<p style="color:#f87171;margin-top:10px">⚠ ${esc(p.error)}</p>`:'';
  $('stage').className='proc';
  $('stage').innerHTML=`<div><h2>Running Vanilla vs CrAM on Qwen…</h2>
    <p class="sub">${loading?'Loading the model (first run, ~10s)…':`${p.done} / ${p.total} statements${bd}`}</p>
    <div class="bar"><div style="width:${loading?6:(p.total?100*p.done/p.total:0)}%"></div></div>${err}
    <p class="sub" style="margin-top:14px;color:#64748b">Computing now — pick a question when it finishes.</p></div>`;
}
async function renderResults(){
  let cards;
  try{ cards=await Promise.all(questions.map(qq=>getJSON('/api/audience/results/'+qq.id))); }
  catch(e){ banner('results fetch failed: '+e.message); return; }   // retry next loop
  $('stage').className='results';
  $('stage').innerHTML=cards.map(c=>{
    const r=(c&&c.results)||{n:0,vanilla_fooled:0,cram_defended:0,flips:0};
    const qid=c&&c.question?c.question.id:0;
    return `<div class="rescard" data-q="${qid}">
      <h3>${esc(c&&c.question?c.question.question:'—')}</h3>
      <div class="stat"><span>claims run</span><b>${r.n}</b></div>
      <div class="stat"><span>vanilla fooled</span><b class="wrong">${r.vanilla_fooled}/${r.n}</b></div>
      <div class="stat"><span>CrAM defended</span><b class="correct">${r.cram_defended}/${r.n}</b></div>
      <div class="stat"><span>clean flips</span><b class="cram">${r.flips}</b></div>
    </div>`;
  }).join('')+'<div class="claimlist" id="claimlist"><p class="tag">click a question above to see each statement’s Vanilla vs CrAM answer</p></div>';
  document.querySelectorAll('.rescard').forEach(el=>el.onclick=()=>openQuestion(+el.dataset.q));
  resultsShown=true;
}
async function openQuestion(qid){
  document.querySelectorAll('.rescard').forEach(el=>el.classList.toggle('sel',+el.dataset.q===qid));
  let c; try{ c=await getJSON('/api/audience/results/'+qid); }catch(e){ banner(e.message); return; }
  const inspectBase=new URL('/',location.href); inspectBase.port='5173';
  const rows=((c.results&&c.results.claims)||[]).map(cl=>`<tr>
    <td>${esc(cl.text)} <span class="tag">${cl.source}</span></td>
    <td class="${cl.vanilla_correct?'':'van-wrong'}">${esc(cl.vanilla)}</td>
    <td class="${cl.cram_correct?'cram-ok':''}">${esc(cl.cram)}</td>
    <td>${cl.flip?'<span class="flip-badge">▲ flip</span>':''}</td>
    <td><a href="${inspectBase.href}?qid=${qid}&claim=${encodeURIComponent(cl.id)}" target="_blank">inspect ↗</a></td></tr>`).join('');
  $('claimlist').innerHTML=`<table><thead><tr><th>statement</th><th>Vanilla</th><th>CrAM</th><th></th><th>explainer</th></tr></thead><tbody>${rows}</tbody></table>`;
}
init();
</script>
</body>
</html>
